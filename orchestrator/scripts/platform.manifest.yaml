name: social-agent-platform
platform_repo: https://github.com/kashewknutt/social-agent-platform.git
platform_branch: main
plugins_dir: plugins
profiles:
  core:
    description: Platform + SDK + dashboard only (no network bots)
    packages:
    - agent-sdk
    - orchestrator
    open: .
    run_hint: 'python -m orchestrator_app.main  # http://127.0.0.1:7400'
  instagram:
    description: Platform + Instagram plugin
    packages:
    - agent-sdk
    - orchestrator
    - bot-instagram
    open: .
    run_hint: 'python -m orchestrator_app.main  # Boot Instagram in the UI'
  fleet:
    description: Platform + Instagram + LinkedIn/X stubs (recommended)
    packages:
    - agent-sdk
    - orchestrator
    - bot-instagram
    - bot-linkedin
    - bot-x
    open: .
    run_hint: 'python -m orchestrator_app.main  # http://127.0.0.1:7400'
packages:
  agent-sdk:
    path: agent-sdk
    kind: plugin
    repo: https://github.com/kashewknutt/agent-sdk.git
    branch: main
    description: Shared bot contract and control runtime
  orchestrator:
    path: orchestrator
    kind: core
    repo: null
    depends_on:
    - agent-sdk
    description: Fleet Control dashboard and proxy
  bot-instagram:
    path: plugins/bot-instagram
    kind: plugin
    repo: https://github.com/kashewknutt/instagram-bot.git
    branch: main
    depends_on:
    - agent-sdk
    description: Instagram observation bot (plugin)
    env_example: plugins/bot-instagram/.env.example
    bot_id: instagram
    port: 7411
    start_command: python -m ig_agent.api
  bot-linkedin:
    path: bot-linkedin
    kind: core
    repo: null
    depends_on:
    - agent-sdk
    description: LinkedIn bot stub
    bot_id: linkedin
    port: 7412
    start_command: python -m linkedin_bot.api
  bot-x:
    path: bot-x
    kind: core
    repo: null
    depends_on:
    - agent-sdk
    description: X bot stub
    bot_id: x
    port: 7413
    start_command: python -m x_bot.api
